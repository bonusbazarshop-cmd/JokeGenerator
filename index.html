<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator - Laugh Out Loud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="stars"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-laugh"></i> Joke Generator</h1>
            <p class="subtitle">Get a random laugh every time!</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Joke Display -->
            <div class="joke-card">
                <div class="joke-content">
                    <p id="jokeText" class="joke-text">Click "Get Joke" to load a random joke!</p>
                </div>
                <div class="joke-category">
                    <span id="categoryTag" class="category-tag">Ready</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="getJokeBtn" class="btn btn-primary">
                    <i class="fas fa-dice"></i> Get Joke
                </button>
                <button id="copyBtn" class="btn btn-secondary">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button id="shareBtn" class="btn btn-secondary">
                    <i class="fas fa-share-alt"></i> Share
                </button>
            </div>

            <!-- Category Filter -->
            <div class="category-section">
                <h3><i class="fas fa-filter"></i> Filter by Category</h3>
                <div class="category-buttons">
                    <button class="category-btn active" data-category="any">
                        <i class="fas fa-star"></i> All
                    </button>
                    <button class="category-btn" data-category="general">
                        <i class="fas fa-face-smile"></i> General
                    </button>
                    <button class="category-btn" data-category="programming">
                        <i class="fas fa-code"></i> Programming
                    </button>
                    <button class="category-btn" data-category="knock-knock">
                        <i class="fas fa-door-open"></i> Knock-Knock
                    </button>
                </div>
            </div>

            <!-- Favorites Section -->
            <div class="favorites-section">
                <h3><i class="fas fa-heart"></i> Favorites</h3>
                <div class="favorites-container">
                    <div id="favoritesList" class="favorites-list"></div>
                    <button id="clearFavoritesBtn" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Clear Favorites
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Jokes Loaded</span>
                    <span class="stat-value" id="jokeCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Favorites</span>
                    <span class="stat-value" id="favCount">0</span>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <a href="https://official-joke-api.appspot.com/" target="_blank">Official Joke API</a> <i class="fas fa-heart"></i></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
